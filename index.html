<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atacado JM - Conferência Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Estilo para remover setas de inputs numéricos, mantendo a interface limpa */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
        
        /* Estilo para itens já marcados/conferidos no resumo */
        .checked-item {
            opacity: 0.5;
            text-decoration: line-through;
            color: #9ca3af;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800 pb-28">

    <header class="bg-blue-700 text-white p-5 shadow-lg sticky top-0 z-10">
        <h1 class="text-xl font-bold text-center tracking-tight">ATACADO JM</h1>
        <p class="text-center text-xs text-blue-200 uppercase tracking-widest mt-1">Gestão de Estoque</p>
    </header>

    <main class="p-4 max-w-md mx-auto">
        
        <div class="bg-white p-4 rounded-2xl shadow-sm mb-4 border border-gray-200">
            <form id="add-form" class="flex gap-2">
                <div class="relative flex-1">
                    <input 
                        type="text" 
                        id="product-name" 
                        placeholder="Novo produto..." 
                        class="w-full bg-gray-50 rounded-xl pl-4 pr-12 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 border border-gray-100"
                        required
                        autocomplete="off"
                    >
                    <button 
                        type="button" 
                        id="mic-btn" 
                        class="absolute right-2 top-1/2 transform -translate-y-1/2 text-gray-400 text-xl p-2 transition-colors duration-200"
                        title="Ditar nome do produto"
                    >
                        🎤
                    </button>
                </div>
                <button 
                    type="submit" 
                    class="bg-blue-600 text-white font-bold px-5 py-3 rounded-xl active:scale-95 transition-transform"
                >
                    Add
                </button>
            </form>
        </div>

        <div class="mb-6 relative">
            <input 
                type="text" 
                id="search-main" 
                placeholder="🔍 Buscar produto na lista..." 
                class="w-full bg-white rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 border border-gray-200 shadow-sm"
                oninput="renderList()"
                autocomplete="off"
            >
        </div>

        <div id="product-list" class="space-y-4">
            </div>

    </main>

    <div class="fixed bottom-0 left-0 w-full bg-white/90 backdrop-blur-md border-t border-gray-200 p-4 flex justify-between gap-3 max-w-md mx-auto right-0">
        <button 
            onclick="clearAll()" 
            class="flex-1 bg-gray-100 text-gray-500 font-bold py-4 rounded-2xl active:bg-gray-200 transition"
        >
            Limpar
        </button>
        <button 
            onclick="openSummary()" 
            class="flex-[2] bg-blue-600 text-white font-bold py-4 rounded-2xl active:bg-blue-700 shadow-lg transition"
        >
            Finalizar Conferência
        </button>
    </div>

    <div id="summary-modal" class="fixed inset-0 bg-black/95 hidden z-50 flex-col">
        <div class="p-5 border-b border-gray-800 flex justify-between items-center bg-gray-900">
            <div>
                <h2 class="text-white text-lg font-bold">Resumo para ERP</h2>
                <p class="text-gray-400 text-xs">Marque os itens já lançados</p>
            </div>
            <button onclick="closeSummary()" class="text-white text-3xl font-light">&times;</button>
        </div>
        
        <div class="p-4 bg-gray-900 border-b border-gray-800">
            <input 
                type="text" 
                id="search-summary" 
                placeholder="🔍 Buscar no resumo..." 
                class="w-full bg-gray-800 text-white rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 border border-gray-700 placeholder-gray-500"
                oninput="renderSummary()"
                autocomplete="off"
            >
        </div>

        <div class="flex-1 overflow-y-auto p-4">
            <div id="summary-list" class="space-y-3">
                </div>
        </div>

        <div class="p-4 bg-gray-900 border-t border-gray-800">
            <button 
                onclick="closeSummary()" 
                class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl active:bg-blue-700 transition"
            >
                Voltar e Continuar
            </button>
        </div>
    </div>

    <script>
        let products = [];

        // Referências do DOM
        const addForm = document.getElementById('add-form');
        const productNameInput = document.getElementById('product-name');
        const searchMainInput = document.getElementById('search-main');
        const productList = document.getElementById('product-list');
        const micBtn = document.getElementById('mic-btn');
        
        const summaryModal = document.getElementById('summary-modal');
        const searchSummaryInput = document.getElementById('search-summary');
        const summaryList = document.getElementById('summary-list');

        // ==========================================
        // CONFIGURAÇÃO DO MICROFONE (VOICE TO TEXT)
        // ==========================================
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'pt-BR'; // Define para o idioma português
            recognition.continuous = false; // Para de ouvir assim que você termina a frase

            recognition.onstart = function() {
                // Efeito visual enquanto está ouvindo
                micBtn.classList.remove('text-gray-400');
                micBtn.classList.add('text-red-500', 'animate-pulse');
                productNameInput.placeholder = "Ouvindo...";
            };

            recognition.onresult = function(event) {
                // Pega o texto falado e coloca no input
                const transcript = event.results[0][0].transcript;
                productNameInput.value = transcript;
                
                // Opcional: Se quiser que ele adicione automaticamente logo após você falar, 
                // remova os comentários (//) da linha abaixo:
                // document.getElementById('add-form').dispatchEvent(new Event('submit', { cancelable: true, bubbles: true }));
            };

            recognition.onerror = function(event) {
                console.error("Erro no reconhecimento de voz:", event.error);
                if(event.error === 'not-allowed') {
                    alert("Por favor, permita o acesso ao microfone no seu navegador.");
                }
            };

            recognition.onend = function() {
                // Retorna o botão ao normal quando termina
                micBtn.classList.remove('text-red-500', 'animate-pulse');
                micBtn.classList.add('text-gray-400');
                productNameInput.placeholder = "Novo produto...";
            };

            micBtn.addEventListener('click', () => {
                recognition.start();
            });
        } else {
            // Esconde o botão se o navegador não suportar
            micBtn.style.display = 'none';
            console.warn("Reconhecimento de voz não suportado neste navegador.");
        }
        // ==========================================

        // Adicionar Produto
        addForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const name = productNameInput.value.trim();
            
            if (name !== '') {
                const existing = products.find(p => p.name.toLowerCase() === name.toLowerCase());
                if (existing) {
                    existing.quantity += 1;
                } else {
                    products.push({ 
                        id: Date.now(), 
                        name: name, 
                        quantity: 1,
                        checked: false 
                    });
                }
                productNameInput.value = '';
                searchMainInput.value = ''; // Limpa a busca ao adicionar
                renderList();
            }
        });

        // Controles de Quantidade, Edição, Cópia e Exclusão
        function updateQuantity(id, change) {
            const product = products.find(p => p.id === id);
            if (product) {
                const newVal = product.quantity + change;
                product.quantity = newVal < 0 ? 0 : newVal;
                renderList();
            }
        }

        function removeProduct(id) {
            if(confirm("Remover este produto da lista?")) {
                products = products.filter(p => p.id !== id);
                renderList();
            }
        }

        function editProduct(id) {
            const product = products.find(p => p.id === id);
            const newName = prompt("Editar nome do produto:", product.name);
            if (newName !== null && newName.trim() !== "") {
                product.name = newName.trim();
                renderList();
                // Se o modal estiver aberto, atualiza lá também
                if (!summaryModal.classList.contains('hidden')) {
                    renderSummary();
                }
            }
        }

        // Função para copiar o texto para o input
        function copyToInput(id) {
            const product = products.find(p => p.id === id);
            if (product) {
                productNameInput.value = product.name;
                productNameInput.focus();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function toggleCheck(id) {
            const product = products.find(p => p.id === id);
            if (product) {
                product.checked = !product.checked;
                renderSummary(); 
            }
        }

        // Renderizar Lista Principal
        function renderList() {
            const searchTerm = searchMainInput.value.toLowerCase();
            const filteredProducts = products.filter(p => p.name.toLowerCase().includes(searchTerm));
            
            productList.innerHTML = '';
            
            if (products.length === 0) {
                productList.innerHTML = '<div class="text-center py-10 text-gray-400">Nenhum item na prancheta.</div>';
                return;
            }

            if (filteredProducts.length === 0) {
                productList.innerHTML = '<div class="text-center py-10 text-gray-400">Nenhum produto encontrado na busca.</div>';
                return;
            }

            filteredProducts.forEach(product => {
                const card = document.createElement('div');
                card.className = 'bg-white p-4 rounded-2xl shadow-sm border border-gray-200 relative overflow-hidden';
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <div class="flex-1 pr-4">
                            <h3 class="font-bold text-gray-800 break-words">${product.name}</h3>
                        </div>
                        <div class="flex gap-2 bg-gray-50 p-1 rounded-lg border border-gray-100">
                            <button onclick="copyToInput(${product.id})" class="text-green-500 p-1 text-lg leading-none hover:scale-110 transition" title="Copiar nome">
                                📋
                            </button>
                            <button onclick="editProduct(${product.id})" class="text-blue-500 p-1 text-lg leading-none hover:scale-110 transition" title="Editar nome">
                                ✎
                            </button>
                            <button onclick="removeProduct(${product.id})" class="text-red-400 p-1 text-lg leading-none hover:scale-110 transition" title="Remover">
                                ✕
                            </button>
                        </div>
                    </div>
                    
                    <div class="flex justify-between items-center bg-gray-50 rounded-xl p-2">
                        <span class="text-xs font-bold text-gray-400 ml-2 uppercase tracking-wider">Qtd Encontrada</span>
                        <div class="flex items-center gap-2">
                            <button onclick="updateQuantity(${product.id}, -1)" class="w-12 h-12 bg-white border border-gray-200 rounded-lg shadow-sm text-2xl font-light active:bg-gray-100">-</button>
                            <input 
                                type="number" 
                                value="${product.quantity}" 
                                onchange="products.find(p=>p.id==${product.id}).quantity = parseInt(this.value) || 0"
                                class="w-14 text-center font-bold text-xl bg-transparent outline-none"
                            >
                            <button onclick="updateQuantity(${product.id}, 1)" class="w-12 h-12 bg-blue-600 text-white rounded-lg shadow-md text-2xl font-light active:bg-blue-700">+</button>
                        </div>
                    </div>
                `;
                productList.appendChild(card);
            });
        }

        // Renderizar Lista do Resumo
        function renderSummary() {
            const searchTerm = searchSummaryInput.value.toLowerCase();
            const filteredProducts = products.filter(p => p.name.toLowerCase().includes(searchTerm));
            
            summaryList.innerHTML = '';
            
            if (products.length === 0) {
                summaryList.innerHTML = '<p class="text-gray-500 text-center py-10">Adicione produtos primeiro.</p>';
                return;
            }

            if (filteredProducts.length === 0) {
                summaryList.innerHTML = '<p class="text-gray-500 text-center py-10">Nenhum produto encontrado na busca.</p>';
                return;
            }

            filteredProducts.forEach(product => {
                const item = document.createElement('div');
                item.className = `flex items-center gap-4 p-4 rounded-xl border border-gray-800 transition-colors ${product.checked ? 'checked-item bg-gray-800/30' : 'bg-gray-800'}`;
                
                item.innerHTML = `
                    <input 
                        type="checkbox" 
                        ${product.checked ? 'checked' : ''} 
                        onchange="toggleCheck(${product.id})"
                        class="w-6 h-6 rounded-md accent-green-500 cursor-pointer flex-shrink-0"
                    >
                    <div class="flex-1 cursor-pointer" onclick="toggleCheck(${product.id})">
                        <p class="text-white font-medium">${product.name}</p>
                        <p class="text-blue-400 font-bold text-sm uppercase mt-1">Total: ${product.quantity}</p>
                    </div>
                `;
                summaryList.appendChild(item);
            });
        }

        // Abrir e Fechar Modal
        function openSummary() {
            searchSummaryInput.value = ''; // Limpa a busca ao abrir o modal
            renderSummary();
            summaryModal.classList.remove('hidden');
            summaryModal.classList.add('flex');
        }

        function closeSummary() {
            summaryModal.classList.add('hidden');
            summaryModal.classList.remove('flex');
        }

        // Limpar Toda a Prancheta
        function clearAll() {
            if (confirm('Deseja apagar toda a conferência atual? Isso não pode ser desfeito.')) {
                products = [];
                searchMainInput.value = '';
                renderList();
            }
        }

        // Inicialização
        renderList();
    </script>
</body>
</html>
